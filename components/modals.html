<div id="postModal" class="modal p-4 hidden">
    <div class="glass p-6 rounded-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto">
        <h2 class="text-lg font-bold mb-4 text-blue-400">📝 Tulis Postingan</h2>
        <input type="text" id="postTitle" placeholder="Judul Artikel" class="w-full bg-slate-800 p-2 rounded mb-3 outline-none border border-white/10">
        <select id="postCategory" class="w-full bg-slate-800 p-2 rounded mb-3 outline-none border border-white/10 text-xs text-slate-300">
            <option value="Umum">Pilih Kategori: Umum</option>
            <option value="Fiqih"> Fiqih</option>
            <option value="sharaf">sharaf</option>
            <option value="Nahu"> Nahu</option>
            <option value="Hadist">Hadist</option>
        </select>
        <textarea id="postContent" placeholder="Isi konten..." rows="16" class="w-full min-h-[320px] max-h-[65vh] resize-y bg-slate-800 p-3 rounded-xl mb-4 outline-none border border-white/10 text-sm leading-relaxed"></textarea>
        <div class="flex gap-2">
            <button onclick="closeModal('postModal'); resetPostModal();" class="flex-1 bg-slate-700 py-2 rounded-lg text-xs">Batal</button>
            <button onclick="submitPost()" id="btnSubmitPost" class="flex-1 bg-blue-600 py-2 rounded-lg text-xs font-bold">Terbitkan</button>
        </div>
    </div>
</div>

<div id="viewModal" class="modal p-4 hidden">
    <div id="floatingAction" class="hidden">
        <button onclick="closeModal('viewModal')"  class="fab-btn"><img src="assets/icons/close.svg" class="icon"></button>
        <button id="btnShare" class="fab-btn" title="Bagikan"><img src="assets/icons/share.svg" class="icon"></button>
        <button id="btnDownload" class="fab-btn" title="Download"><img src="assets/icons/download.svg" class="icon"></button>
        <button id="btnToc" class="fab-btn" title="Daftar Isi"><img src="assets/icons/menu.svg" class="icon"></button>
    </div>

    <div id="tocPopup" class="fab-popup hidden">
        <div class="fab-popup-inner" id="tocContainer"></div>
    </div>

    <div id="sharePopup" class="fab-popup hidden">
        <div class="fab-popup-inner">
            <div class="popup-title">Bagikan Link</div>
            <div class="popup-url">
                <input type="text" id="shareUrl" readonly>
                <button id="copyUrl" class="bg-blue-600 px-3 py-1 rounded text-[10px]">Salin</button>
            </div>
        </div>
    </div>

    <div id="downloadPopup" class="fab-popup hidden">
        <div class="fab-popup-inner">
            <div class="popup-title">Format Download</div>
            <button id="dlMd" class="popup-item">Markdown (.md)</button>
            <button id="dlHtml" class="popup-item">HTML (.html)</button>
        </div>
    </div>

    <div class="glass p-6 rounded-2xl w-full max-w-4xl max-h-[90vh] overflow-y-auto">
        <h2 id="viewTitle" class="text-xl font-bold mb-4 text-blue-400 text-center"></h2>
        <div id="viewContent" class="text-sm opacity-80 leading-loose mb-6"></div>
        <button onclick="closeModal('viewModal')" class="w-full bg-slate-700 py-2 rounded-lg text-xs mt-6">Tutup</button>
    </div>
</div
